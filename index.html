<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Blessings From Mummy & Papa</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
background:linear-gradient(135deg,#ffecd2,#fcb69f);
overflow:hidden;
padding:20px;
}

.container{
background:#fff;
padding:20px;
border-radius:20px;
box-shadow:0 10px 30px rgba(0,0,0,.2);
text-align:center;
max-width:380px;
width:100%;
position:relative;
z-index:10;
}

img{
width:100%;
border-radius:15px;
box-shadow:0 5px 20px rgba(0,0,0,.2);
}

h1{
margin:18px 0 10px;
font-size:28px;
color:#d35400;
}

p{
font-size:17px;
color:#555;
margin-bottom:20px;
}

button{
padding:15px 28px;
border:none;
border-radius:50px;
font-size:18px;
font-weight:bold;
cursor:pointer;
background:linear-gradient(45deg,#ff512f,#dd2476);
color:white;
transition:.3s;
box-shadow:0 6px 15px rgba(0,0,0,.25);
}

button:hover{
transform:scale(1.05);
}

.confetti{
position:fixed;
width:10px;
height:10px;
top:-20px;
animation:fall linear infinite;
}

@keyframes fall{
0%{
transform:translateY(-10vh) rotate(0deg);
}
100%{
transform:translateY(110vh) rotate(720deg);
}
}
</style>
</head>

<body>

<div class="container">

<img src="Parents.png" alt="Mummy Papa">

<h1>🙏 Blessings From Mummy & Papa ❤️</h1>

<p>
With their endless love and blessings,
every journey becomes beautiful.
</p>

<button onclick="window.open('https://gurpreetatwork1-cmd.github.io/Button2/','_blank')">
Receive Blessings ❤️
</button>

</div>

<script>

const colors=[
"#ff4d6d",
"#ffd60a",
"#06d6a0",
"#4cc9f0",
"#9b5de5",
"#f15bb5"
];

function createConfetti(){

const conf=document.createElement("div");

conf.className="confetti";

conf.style.left=Math.random()*100+"vw";

conf.style.background=
colors[Math.floor(Math.random()*colors.length)];

conf.style.width=5+Math.random()*8+"px";

conf.style.height=8+Math.random()*12+"px";

conf.style.opacity=Math.random();

conf.style.animationDuration=3+Math.random()*4+"s";

document.body.appendChild(conf);

setTimeout(()=>{
conf.remove();
},7000);

}

setInterval(createConfetti,120);

</script>

</body>
</html>
